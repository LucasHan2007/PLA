<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>柔光编程 · 先序递归引导学习</title>
    <!-- Monaco Editor 核心库 -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.min.css">
    <!-- D3.js 知识图谱 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f9fafc;
            height: 100vh;
            overflow: hidden;
        }

        /* 柔和滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* 整体三栏布局 */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: #f9fafc;
        }

        /* ========= 左侧代码区 ========= */
        .editor-area {
            flex: 5;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 24px;
            margin: 16px 8px 16px 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }
        .editor-header {
            padding: 16px 20px;
            background: #ffffff;
            border-bottom: 1px solid #edf2f7;
            font-weight: 500;
            font-size: 15px;
            color: #1e293b;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .editor-header::before {
            content: "✏️";
            font-size: 18px;
        }
        #editor {
            flex: 1;
            width: 100%;
            background: #fefefe;
        }

        /* ========= 右侧分区 ========= */
        .right-area {
            flex: 4;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 16px 16px 8px;
        }

        /* 对话区卡片 */
        .chat-area {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .chat-header {
            padding: 16px 20px;
            background: #ffffff;
            border-bottom: 1px solid #edf2f7;
            font-weight: 500;
            font-size: 15px;
            color: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            color: #334155;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: #e2e8f0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fefefe;
        }
        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 14px;
            line-height: 1.45;
            word-wrap: break-word;
        }
        .user {
            align-self: flex-end;
            background: #eef2ff;
            color: #1e293b;
            border-bottom-right-radius: 6px;
        }
        .ai {
            align-self: flex-start;
            background: #f8fafc;
            color: #1e293b;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .ai button {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 6px 14px;
            margin-top: 10px;
            margin-right: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: #334155;
            transition: all 0.2s;
        }
        .ai button:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .preset-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #ffffff;
            border-top: 1px solid #edf2f7;
        }
        .preset-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            color: #1e293b;
            transition: background 0.2s;
        }
        .preset-btn:hover {
            background: #e2e8f0;
        }
        .input-area {
            display: flex;
            padding: 12px 20px 20px 20px;
            background: #ffffff;
            border-top: 1px solid #edf2f7;
        }
        #chat-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            outline: none;
            font-size: 14px;
            background: #fefefe;
            transition: border 0.2s;
        }
        #chat-input:focus {
            border-color: #94a3b8;
        }
        #send-btn {
            margin-left: 10px;
            background: #eef2ff;
            border: none;
            color: #334155;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background: #e2e8f0;
        }

        /* 知识图谱区 */
        .knowledge-area {
            flex: 2;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .knowledge-header {
            padding: 12px 20px;
            background: #ffffff;
            border-bottom: 1px solid #edf2f7;
            font-weight: 500;
            font-size: 14px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .knowledge-header::before {
            content: "🌿";
            font-size: 16px;
        }
        #graph-container {
            flex: 1;
            min-height: 180px;
            background: #fefefe;
            padding: 8px;
        }

        /* 知识图谱内部样式微调 */
        .node text {
            font-size: 11px;
            fill: #334155;
            font-weight: 500;
            text-shadow: 0 1px 0 white;
        }
        .link {
            stroke: #cbd5e1;
            stroke-width: 1.5;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 左侧代码编辑器 -->
    <div class="editor-area">
        <div class="editor-header">代码编辑 · 内联引导提示</div>
        <div id="editor"></div>
    </div>

    <!-- 右侧区域 -->
    <div class="right-area">
        <!-- 对话区 -->
        <div class="chat-area">
            <div class="chat-header">
                💬 先序递归引导
                <button class="back-btn" id="resetBtn">↺ 返回主干</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">👋 我会按照“先讲第一个疑难点 → 深入子问题 → 再返回讲下一个”的顺序引导你。点击下方按钮开始。</div>
            </div>
            <div class="preset-questions">
                <button class="preset-btn" data-question="我不懂循环边界">🔁 循环边界</button>
                <button class="preset-btn" data-question="什么是二分查找原理">📘 二分查找原理</button>
                <button class="preset-btn" data-question="如何优化这段代码">⚡ 优化思路</button>
            </div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="输入你的问题或回复...">
                <button id="send-btn">➤</button>
            </div>
        </div>

        <!-- 知识图谱区 -->
        <div class="knowledge-area">
            <div class="knowledge-header">知识图谱 · 点击节点学习</div>
            <div id="graph-container"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
    // ======================= 预定义难点树（先序递归顺序）========================
    const difficultyTree = {
        id: "root", name: "二分查找",
        children: [
            { id: "A", name: "循环边界条件", desc: "while left <= right 还是 left < right？",
              children: [
                  { id: "A1", name: "为什么用 <= 而不是 <", desc: "闭区间下 left==right 时还有一个元素待检查" },
                  { id: "A2", name: "mid 计算溢出风险", desc: "mid = (left+right)//2 可能溢出，建议 left + (right-left)//2" }
              ] },
            { id: "B", name: "未找到时的返回值", desc: "应该返回 -1 而不是 len(arr)", children: [] },
            { id: "C", name: "mid 更新逻辑", desc: "left = mid+1 / right = mid-1，否则死循环", children: [] }
        ]
    };

    // 先序生成顺序列表
    let guideOrder = [];
    function preorder(node) {
        if (node.id !== "root") guideOrder.push({ id: node.id, name: node.name, desc: node.desc });
        if (node.children) node.children.forEach(child => preorder(child));
    }
    preorder(difficultyTree);

    // 状态管理
    let currentIndex = 0;
    let waiting = false;
    let currentId = null;

    // DOM 元素
    const chatDiv = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const resetBtn = document.getElementById('resetBtn');

    function addMessage(role, text, buttons = null) {
        const msg = document.createElement('div');
        msg.className = `message ${role}`;
        msg.innerHTML = text;
        if (buttons && role === 'ai') {
            const btnDiv = document.createElement('div');
            buttons.forEach(btn => {
                const b = document.createElement('button');
                b.textContent = btn.label;
                b.onclick = btn.onClick;
                btnDiv.appendChild(b);
            });
            msg.appendChild(btnDiv);
        }
        chatDiv.appendChild(msg);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function startNext() {
        if (waiting) {
            addMessage('ai', "请先确认当前问题是否理解（点击“理解了”）。");
            return;
        }
        if (currentIndex >= guideOrder.length) {
            addMessage('ai', "🎉 所有疑难点已讲解完毕。你可以继续修改代码或提问。");
            return;
        }
        const node = guideOrder[currentIndex];
        currentId = node.id;
        addMessage('ai', `📌 **${node.name}**\n${node.desc}\n\n你理解了吗？`, [
            { label: "✅ 理解了，继续", onClick: () => handleUnderstand() },
            { label: "❓ 需要提示", onClick: () => giveHint(node) }
        ]);
        waiting = true;
        highlightGraph(node.id);
    }

    function handleUnderstand() {
        if (!waiting) return;
        waiting = false;
        currentIndex++;
        startNext();
    }

    function giveHint(node) {
        let hint = "";
        if (node.id === "A1") hint = "💡 提示：想象区间 [left, right]，当 left == right 时还有一个元素，所以需要 <= 才能进入循环。";
        else if (node.id === "A2") hint = "💡 提示：使用 left + (right - left) // 2 更安全。";
        else if (node.id === "A") hint = "💡 提示：你可以画一个数组，手动模拟边界情况。";
        else if (node.id === "B") hint = "💡 提示：未找到时返回 -1 是常见做法，返回 len(arr) 会让调用者误解。";
        else if (node.id === "C") hint = "💡 提示：mid 已经比较过，新区间应该排除它，所以 left = mid+1 或 right = mid-1。";
        else hint = "💡 试着在纸上运行一下代码，观察变量变化。";
        addMessage('ai', hint);
    }

    function resetGuide() {
        currentIndex = 0;
        waiting = false;
        addMessage('ai', "🔄 已重置引导，重新从第一个疑难点开始。");
        startNext();
    }

    function handleUserQuestion(question) {
        addMessage('user', question);
        // 模拟回答（不打断主干）
        if (question.includes("边界")) {
            addMessage('ai', "关于边界条件，你可以先完成当前引导中的“循环边界条件”部分，那里有详细讲解。");
        } else if (question.includes("原理")) {
            addMessage('ai', "二分查找每次将范围减半，要求数组有序。点击知识图谱中的节点可查看细节。");
        } else {
            addMessage('ai', "这个问题很好！为了不偏离主干，建议先完成当前疑难点，或点击“返回主干”重置。");
        }
    }

    // -------------------- 知识图谱 D3 树（柔和色） --------------------
    let svg;
    function renderGraph() {
        const container = document.getElementById('graph-container');
        const width = container.clientWidth;
        const height = container.clientHeight;
        d3.select("#graph-container svg").remove();
        const root = d3.hierarchy(difficultyTree);
        const treeLayout = d3.tree().size([height - 60, width - 100]);
        treeLayout(root);
        svg = d3.select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", "translate(30,30)");
        // 连线
        svg.selectAll(".link")
            .data(root.links())
            .enter()
            .append("path")
            .attr("class", "link")
            .attr("fill", "none")
            .attr("stroke", "#cbd5e1")
            .attr("stroke-width", 1.5)
            .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));
        // 节点
        const nodes = svg.selectAll(".node")
            .data(root.descendants())
            .enter()
            .append("g")
            .attr("transform", d => `translate(${d.y},${d.x})`)
            .on("click", (event, d) => {
                if (d.data.id === "root") return;
                addMessage('ai', `📖 **${d.data.name}**：${d.data.desc || "这是一个知识点。"}`);
            });
        nodes.append("circle")
            .attr("r", 7)
            .attr("fill", d => d.data.id === currentId ? "#f59e0b" : "#a5b4fc")
            .attr("stroke", "#ffffff")
            .attr("stroke-width", 2);
        nodes.append("text")
            .attr("dy", ".35em")
            .attr("x", 12)
            .text(d => d.data.name)
            .style("font-size", "11px")
            .style("fill", "#334155")
            .style("font-weight", "500");
    }
    function highlightGraph(id) {
        if (!svg) return;
        svg.selectAll("circle").attr("fill", d => d.data.id === id ? "#f59e0b" : "#a5b4fc");
    }
    window.addEventListener('resize', () => renderGraph());
    setTimeout(() => renderGraph(), 200);

    // -------------------- Monaco 编辑器及内联注释 --------------------
    let editor;
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        editor = monaco.editor.create(document.getElementById('editor'), {
            value: `def binary_search(arr, target):
    left = 0
    right = len(arr) - 1
    while left < right:   # 边界条件待优化
        mid = (left + right) // 2
        if arr[mid] == target:
            return mid
        elif arr[mid] < target:
            left = mid
        else:
            right = mid
    return len(arr)  # 返回值不合理`,
            language: 'python',
            theme: 'vs-light',      // 柔和浅色主题
            automaticLayout: true,
            fontSize: 14,
            lineNumbers: 'on',
            fontFamily: 'JetBrains Mono, Fira Code, monospace'
        });
        // 内联提示装饰（柔和灰色）
        const decorations = [
            { range: new monaco.Range(4, 11, 4, 22), options: { before: { content: '⚠️ 提示：边界条件 left <= right 还是 left < right？' } } },
            { range: new monaco.Range(8, 18, 8, 22), options: { before: { content: '💡 思考：更新 left 时是否应该 +1？' } } },
            { range: new monaco.Range(12, 12, 12, 25), options: { before: { content: '🤔 未找到时应该返回 -1 还是 len(arr)？' } } }
        ];
        editor.deltaDecorations([], decorations);
    });

    // 绑定事件
    sendBtn.onclick = () => {
        const text = chatInput.value.trim();
        if (text) {
            handleUserQuestion(text);
            chatInput.value = "";
        }
    };
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.onclick = () => handleUserQuestion(btn.getAttribute('data-question'));
    });
    resetBtn.onclick = () => resetGuide();

    // 自动开始引导
    setTimeout(() => { startNext(); }, 500);
</script>
</body>
</html>
