<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #toolbar { display: flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px; background: #f3f3f3; border-bottom: 1px solid #e5e5e5; }
    #toolbar button { border: 1px solid #ccc; background: #fff; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
    #toolbar button:hover { background: #e8e8e8; }
    #toolbar .spacer { flex: 1; }
    #toolbar .lang { font-size: 12px; color: #555; }
    #container { height: calc(100% - 36px); }
  </style>
</head>
<body>
  <div id="toolbar">
    <span class="lang">Python</span>
    <div class="spacer"></div>
    <button id="btn-format" type="button">格式化</button>
    <button id="btn-copy" type="button">复制</button>
    <button id="btn-check" type="button">检查语法</button>
    <button id="btn-save" type="button">保存</button>
  </div>
  <div id="container"></div>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="./editor.js"></script>
</body>
</html>
